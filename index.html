<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SyntaxWear é a sua loja online de tênis e sneakers, oferecendo uma ampla seleção de calçados esti
    losos e confortáveis para todas as ocasiões. Encontre os últimos lançamentos, designs exclusivos e promoções imperdíveis em nossa plataforma. Compre com confiança e receba seus produtos diretamente em casa. Explore nossa coleção e eleve seu estilo com SyntaxWear!">
  <title>SyntaxWear - Ecommerce</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/product-category.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <h1 class="logo">
      <a href="#" title="Ssyntaxwear - Tênis e Sneakers online - ">
        <img src="./images/logo/logo.svg" alt="syntaxwear - Tênis e Sneakers online">
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <nav class="nav-right" aria-label="acesso rápido">
      <ul>
        <li><a href="#">Nossas Lojas</a></li>

        <li><a href="#">Sobre</a></li>

        <li>
          <a href="#" aria-label="Minha Conta">
            <img src="./images/icons/user.svg" alt="Minha Conta">
          </a>
        </li>

        <li>
          <a href="#" aria-label="Ajuda">
            <img src="./images/icons/help.svg" alt="Ajuda">
          </a>
        </li>

        <li><a href="#" aria-label="Carrinho">
            <img src="./images/icons/bag.svg" alt="Carrinho">
          </a>
        </li>
      </ul>

    </nav>
  </header>

  <!-- Main -->
  <main>
    <!-- Hero/Banner Principal -->
    <section class="hero-section">
      <div class="hero-overlay">


        <div class="hero-content">
          <span class="hero-subtitulo">
            Ktypton One
          </span>
          <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
          <div class="hero-buttons">
            <a class="btn btn-outline" href="#">Ver modelos</a>
            <a class="btn btn-filled" href="#">Compras</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Categorias em Destaque -->
    <section class="categories-section">

      <div class="category-card casual">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Casual</span>
        </a>
      </div>
      <div class="category-card moderno ">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Esporte</span>
        </a>
      </div>
      <div class="category-card futurista">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Moderno</span>
        </a>
      </div>
      <div class="category-card exportivo">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Futurista</span>
        </a>
      </div>

    </section>

    <!-- Produtos em Destaque -->
    <section class="featured-products"></section>

    <!-- Promoções -->
    <section class="promotions"></section>

    <!-- Depoimentos -->
    <section class="grid-section">
      <div class="card highlight">
        <div class="top1-content">
          <h3 class="card-title">Krypton One</h3>
          <p class="card-text">Estilo é aqui!</p>
          <div class="cta-group">
            <a href="#" class="btn btn-outline">Feminino</a>
            <a href="#" class="btn btn-filled">Masculino</a>
          </div>
        </div>
      </div>
      <div class="card sneakers-purple"></div>
      <div class="card model"></div>
      <div class="card sneakers-color"></div>
      <div class="card sneakers-white"></div>
      <div class="card sneakers-silver"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">

  </footer>
</body>

</html>
